services:
  bridge:
    container_name: bridge
    build:
      context: .
      dockerfile: containers/cursor-sdk-bridge/Dockerfile
    develop:
      watch:
        - action: sync+restart
          path: ./scripts/cursor-sdk-local-agent-bridge.mjs
          target: /app/scripts/cursor-sdk-local-agent-bridge.mjs
        - action: sync+restart
          path: ./scripts/composer-tool-markers.mjs
          target: /app/scripts/composer-tool-markers.mjs
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
    environment:
      CURSOR_SDK_BRIDGE_TOKEN: ${CURSOR_SDK_BRIDGE_TOKEN:-}
      CURSOR_SDK_WORKING_DIRECTORY: /workspace
      CURSOR_SDK_BRIDGE_RUN_TIMEOUT_MS: ${CURSOR_SDK_BRIDGE_RUN_TIMEOUT_MS:-360000}
      CURSOR_SDK_BRIDGE_MAX_JSON_BYTES: ${CURSOR_SDK_BRIDGE_MAX_JSON_BYTES:-16777216}
    volumes:
      - ${WORKSPACE:-.}:/workspace:rw
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8792/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - composer-api
    restart: always

  api:
    container_name: api
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    develop:
      watch:
        - action: sync+restart
          path: ./worker
          target: /app/worker
        - action: sync+restart
          path: ./docker
          target: /app/docker
        - action: sync+restart
          path: ./scripts/composer-tool-markers.mjs
          target: /app/scripts/composer-tool-markers.mjs
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
    ports:
      - "${CURSOR_API_PORT:-8787}:8787"
    environment:
      CURSOR_SDK_BRIDGE_URL: http://bridge:8792/sdk
      CURSOR_SDK_BRIDGE_TOKEN: ${CURSOR_SDK_BRIDGE_TOKEN:-}
      CURSOR_API_BASE: ${CURSOR_API_BASE:-https://api.cursor.com}
      CURSOR_BACKEND_BASE_URL: ${CURSOR_BACKEND_BASE_URL:-https://api2.cursor.sh}
      CURSOR_CHAT_ENDPOINT: ${CURSOR_CHAT_ENDPOINT:-/aiserver.v1.AiService/StreamChat}
      CURSOR_LOCAL_AGENT_ENDPOINT: ${CURSOR_LOCAL_AGENT_ENDPOINT:-/agent.v1.AgentService/Run}
      CURSOR_CLIENT_VERSION: ${CURSOR_CLIENT_VERSION:-2.6.22}
      CURSOR_SDK_CLIENT_VERSION: ${CURSOR_SDK_CLIENT_VERSION:-sdk-1.0.13}
      CURSOR_SDK_BRIDGE_TIMEOUT_MS: ${CURSOR_SDK_BRIDGE_TIMEOUT_MS:-360000}
    depends_on:
      bridge:
        condition: service_healthy
    networks:
      - composer-api
    restart: always
networks:
  composer-api:
