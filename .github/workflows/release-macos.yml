name: Release macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "App version, for example 0.1.0"
        required: true
        type: string
      build:
        description: "Build number. Defaults to the GitHub run number."
        required: false
        type: string

permissions:
  contents: write

jobs:
  dmg:
    name: Build, sign, notarize, and publish DMG
    runs-on: macos-15
    env:
      R2_RELEASE_BUCKET: api-for-composer-releases
      CURSOR_API_APPCAST_URL: https://api-for-composer.standardagents.ai/appcast.xml
      CURSOR_API_RELEASE_BASE_URL: https://api-for-composer.standardagents.ai/releases
      CURSOR_API_CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      NOTARY_WEBHOOK_TOKEN: ${{ secrets.NOTARY_WEBHOOK_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          build="${{ inputs.build }}"
          if [ -z "$build" ]; then
            build="$GITHUB_RUN_NUMBER"
          fi
          echo "CURSOR_API_APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "CURSOR_API_APP_BUILD=$build" >> "$GITHUB_ENV"

      - name: Validate release secrets
        run: |
          set -euo pipefail
          missing=()
          for name in \
            MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 \
            MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            MACOS_CODE_SIGN_IDENTITY \
            SPARKLE_PUBLIC_ED_KEY \
            SPARKLE_PRIVATE_KEY \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_PASSWORD \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID
          do
            value="$(printenv "$name" || true)"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required release secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi
        env:
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          MACOS_CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import Developer ID certificate
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/release.keychain-db"
          keychain_password="$(uuidgen)"
          printf '%s' "$MACOS_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep -F "$CURSOR_API_CODE_SIGN_IDENTITY"
        env:
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}

      - name: Build app bundle
        run: macos/CursorAPI/Scripts/package-app.sh --release

      - name: Verify app bundle
        run: macos/CursorAPI/Scripts/verify-package.sh "macos/CursorAPI/dist/API for Cursor.app"

      - name: Create DMG
        id: dmg
        run: |
          set -euo pipefail
          dmg_path="$(macos/CursorAPI/Scripts/create-dmg.sh "macos/CursorAPI/dist/API for Cursor.app")"
          echo "path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$dmg_path")" >> "$GITHUB_OUTPUT"

      - name: Upload pending notarization artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-for-cursor-macos-pending-${{ env.CURSOR_API_APP_VERSION }}-${{ env.CURSOR_API_APP_BUILD }}
          retention-days: 7
          if-no-files-found: error
          path: |
            ${{ steps.dmg.outputs.path }}
            macos/CursorAPI/dist/API for Cursor.app
            macos/CursorAPI/.build/artifacts/sparkle/Sparkle/bin/sign_update

      - name: Notarize DMG
        id: notary
        timeout-minutes: 50
        run: |
          set -euo pipefail

          output="$RUNNER_TEMP/notary-output.txt"
          webhook_url=""
          pending_ok=""
          if [ -n "${NOTARY_WEBHOOK_TOKEN:-}" ]; then
            webhook_url="$(
              python3 - <<'PY'
import os
from urllib.parse import quote, urlencode

token = os.environ["NOTARY_WEBHOOK_TOKEN"]
base = "https://api-for-composer.standardagents.ai/api/notary/webhook"
params = {
    "version": os.environ["CURSOR_API_APP_VERSION"],
    "build": os.environ["CURSOR_API_APP_BUILD"],
    "run_id": os.environ["GITHUB_RUN_ID"],
    "artifact": f"api-for-cursor-macos-pending-{os.environ['CURSOR_API_APP_VERSION']}-{os.environ['CURSOR_API_APP_BUILD']}",
    "dmg": os.environ["DMG_NAME"],
    "ref": os.environ["GITHUB_REF"],
}
print(f"{base}/{quote(token, safe='')}?{urlencode(params)}")
PY
            )"
            pending_ok="1"
          fi

          set +e
          APPLE_NOTARY_OUTPUT="$output" \
            APPLE_NOTARY_PENDING_OK="$pending_ok" \
            APPLE_NOTARY_WEBHOOK_URL="$webhook_url" \
            macos/CursorAPI/Scripts/notarize-dmg.sh "${{ steps.dmg.outputs.path }}"
          status=$?
          set -e

          if [ -s "$output" ]; then
            cat "$output" >> "$GITHUB_OUTPUT"
          fi
          if [ "$status" -eq 75 ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "Apple notarization is still pending. A webhook will trigger the finalizer when Apple finishes."
            exit 0
          fi
          echo "pending=false" >> "$GITHUB_OUTPUT"
          exit "$status"
        env:
          DMG_NAME: ${{ steps.dmg.outputs.name }}

      - name: Generate Sparkle appcast
        if: steps.notary.outputs.pending != 'true'
        id: appcast
        timeout-minutes: 10
        run: |
          set -euo pipefail
          tools_dir="macos/CursorAPI/.build/artifacts/sparkle/Sparkle/bin"
          appcast_path="$(
            SPARKLE_SIGN_UPDATE="$tools_dir/sign_update" \
            macos/CursorAPI/Scripts/generate-appcast.sh "${{ steps.dmg.outputs.path }}"
          )"
          grep -q 'sparkle:edSignature=' "$appcast_path"
          grep -q "${CURSOR_API_RELEASE_BASE_URL}/" "$appcast_path"
          echo "path=$appcast_path" >> "$GITHUB_OUTPUT"

      - name: Upload release files to Cloudflare R2
        if: steps.notary.outputs.pending != 'true'
        run: |
          set -euo pipefail
          dmg="${{ steps.dmg.outputs.path }}"
          dmg_name="${{ steps.dmg.outputs.name }}"
          appcast="${{ steps.appcast.outputs.path }}"
          npx wrangler r2 object put "$R2_RELEASE_BUCKET/releases/$dmg_name" \
            --file "$dmg" \
            --content-type application/x-apple-diskimage
          npx wrangler r2 object put "$R2_RELEASE_BUCKET/releases/API-for-Cursor-latest.dmg" \
            --file "$dmg" \
            --content-type application/x-apple-diskimage
          npx wrangler r2 object put "$R2_RELEASE_BUCKET/appcast.xml" \
            --file "$appcast" \
            --content-type application/rss+xml

      - name: Verify published release files
        if: steps.notary.outputs.pending != 'true'
        run: |
          set -euo pipefail

          retry() {
            label="$1"
            shift
            for attempt in $(seq 1 12); do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -lt 12 ]; then
                echo "$label is not ready yet; retrying in 5s..."
                sleep 5
              fi
            done
            echo "$label did not become available" >&2
            return 1
          }

          retry "appcast" curl -fsSL "$CURSOR_API_APPCAST_URL" -o /tmp/api-for-cursor-appcast.xml
          grep -q 'sparkle:edSignature=' /tmp/api-for-cursor-appcast.xml
          grep -q "${CURSOR_API_RELEASE_BASE_URL}/" /tmp/api-for-cursor-appcast.xml

          retry "latest DMG" curl -fsSL --range 0-0 "${CURSOR_API_RELEASE_BASE_URL}/API-for-Cursor-latest.dmg" -o /tmp/api-for-cursor-latest-byte
          [ -s /tmp/api-for-cursor-latest-byte ]

      - name: Upload GitHub Actions artifacts
        if: steps.notary.outputs.pending != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-for-cursor-macos-${{ env.CURSOR_API_APP_VERSION }}-${{ env.CURSOR_API_APP_BUILD }}
          path: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.appcast.outputs.path }}

      - name: Publish GitHub release assets
        if: github.ref_type == 'tag' && steps.notary.outputs.pending != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.appcast.outputs.path }}
